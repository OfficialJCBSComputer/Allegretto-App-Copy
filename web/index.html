<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <meta name="description" content="Allegretto Eisteddfod - The official platform for entries, syllabus information, and performance dates. Participate in music, drama, and dance.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Allegretto">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Allegretto Eisteddfod | Official Web Platform</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      background-color: #121212;
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
    }
    #loading-indicator {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      width: 100%;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .loader {
      border: 3px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      border-top: 3px solid #5C6BC0;
      width: 30px;
      height: 30px;
      animation: spin 0.8s linear infinite;
      margin-bottom: 15px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    #seo-content {
      position: absolute;
      left: -9999px;
      visibility: hidden;
    }
  </style>

  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5878584013742794"
     crossorigin="anonymous"></script>
</head>
<body>
  <div id="loading-indicator">
    <div class="loader"></div>
    <div style="font-size: 14px; opacity: 0.7;">Loading Allegretto...</div>
  </div>

  <div id="seo-content">
    <h1>Allegretto Eisteddfod Official Web Platform</h1>
    <p>Official portal for Music, Drama, Dance and Visual Arts entries and syllabus across South Africa.</p>
  </div>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
